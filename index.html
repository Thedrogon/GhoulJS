<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>GhoulJS - JavaScript Playground</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="app">
      <div class="tabs-bar">
        <div class="tabs-list"></div>
        <button class="add-tab-btn" title="New Tab">
          <i class="fas fa-plus"></i>
        </button>
      </div>

      <div class="workspace">
        <aside class="sidebar">
          <nav class="sidebar-nav">
            <button id="runBtn" class="sidebar-btn" title="Run Code (Cmd/Ctrl + R)">
              <i class="fas fa-play"></i>
            </button>
            <button id="stopBtn" class="sidebar-btn sidebar-btn-stop" title="Stop Execution (Cmd/Ctrl + .)">
              <i class="fas fa-stop"></i>
            </button>
            <div class="sidebar-divider"></div>
            <button id="clearBtn" class="sidebar-btn" title="Clear Output (Cmd/Ctrl + K)">
              <i class="fas fa-trash"></i>
            </button>
          </nav>

          <div class="sidebar-bottom">
            <button id="settingsBtn" class="sidebar-btn" title="Settings (Cmd/Ctrl + ,)">
              <i class="fas fa-cog"></i>
            </button>
          </div>
        </aside>

        <main class="main-content">
          <div class="tabs-content"></div>
        </main>
      </div>
    </div>

    <div id="settingsPanel" class="settings-panel">
      <div class="settings-modal">
        <div class="settings-header">
          <h3>Configuration</h3>
          <button id="closeSettingsBtn" class="close-settings-btn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="settings-modal-content">
          <div class="settings-content">
            <div class="settings-section">
              <h4>Appearance</h4>
              <div class="setting-item">
                <label>Theme</label>
                <select id="theme-select">
                  <option value="ghoul-dark">Ghoul Dark</option>
                  <option value="paladin-light">Paladin Light</option>
                </select>
              </div>
              <div class="setting-item">
                <label>Font Family</label>
                <select id="font-family-select">
                  <option value="JetBrains Mono">JetBrains Mono</option>
                  <option value="Fira Code">Fira Code</option>
                  <option value="Consolas">Consolas</option>
                  <option value="Monaco">Monaco</option>
                  <option value="Menlo">Menlo</option>
                </select>
              </div>
              <div class="setting-item">
                <label>Font Size</label>
                <div class="font-size-input-wrapper">
                  <input
                    type="number"
                    id="font-size-input"
                    min="8"
                    max="32"
                    value="14"
                    class="font-size-input"
                  />
                  <span class="font-size-unit">px</span>
                </div>
              </div>
            </div>

            <div class="settings-section">
              <h4>Editor</h4>
              <div class="setting-item">
                <label>
                  <input type="checkbox" id="word-wrap-toggle" checked />
                  <span>Word Wrap</span>
                </label>
              </div>
              <div class="setting-item">
                <label>
                  <input type="checkbox" id="minimap-toggle" />
                  <span>Minimap</span>
                </label>
              </div>
              <div class="setting-item">
                <label>
                  <input type="checkbox" id="auto-run-toggle" checked />
                  <span>Auto-run Code</span>
                </label>
              </div>
              <div class="setting-item">
                <label>
                  <input type="checkbox" id="line-numbers-toggle" />
                  <span>Show Line Numbers</span>
                </label>
              </div>
              <div class="setting-item">
                <label>Tab Size</label>
                <select id="tab-size-select">
                  <option value="2">2 spaces</option>
                  <option value="4">4 spaces</option>
                  <option value="8">8 spaces</option>
                </select>
              </div>
            </div>

            <div class="settings-section">
              <h4>Shortcuts</h4>
              <div class="shortcut-item">
                <span>Run Code</span>
                <kbd>Cmd/Ctrl + R</kbd>
              </div>
              <div class="shortcut-item">
                <span>New File</span>
                <kbd>Cmd/Ctrl + N</kbd>
              </div>
              <div class="shortcut-item">
                <span>Save File</span>
                <kbd>Cmd/Ctrl + S</kbd>
              </div>
              <div class="shortcut-item">
                <span>Open Settings</span>
                <kbd>Cmd/Ctrl + ,</kbd>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/renderer/index.ts"></script>
  </body>
</html>
